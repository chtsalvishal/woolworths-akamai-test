name: Test New Woolworths Scraper

on:
  workflow_dispatch:
  push:
    paths:
      - 'test_new_scraper.py'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl-cffi

      - name: Run new scraper test
        run: python test_new_scraper.py
