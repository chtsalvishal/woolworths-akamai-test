name: Akamai Feasibility Test

on:
  workflow_dispatch:   # manual trigger only — run this from GitHub Actions tab

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install patchright curl-cffi

      - name: Install Chromium via patchright
        run: patchright install chromium --with-deps

      - name: Run Akamai feasibility test
        run: python test_akamai.py
