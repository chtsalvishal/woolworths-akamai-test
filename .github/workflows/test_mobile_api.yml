name: Woolworths Mobile API Feasibility Test

on:
  workflow_dispatch:   # manual trigger only — run this from GitHub Actions tab

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl-cffi

      - name: Run mobile API feasibility test
        run: python test_mobile_api.py
