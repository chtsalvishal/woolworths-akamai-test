name: Woolworths Deep Specials Investigation

on:
  workflow_dispatch:

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl-cffi

      - name: Run deep specials investigation
        run: python test_deep_specials.py
